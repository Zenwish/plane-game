<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞机大战升级</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: #000;
      border: 1px solid #222;
      z-index: 2;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 18px;
      user-select: none;
      pointer-events: none;
      letter-spacing: 1px;
      z-index: 10;
    }
    #controls {
      position: fixed;
      top: 44px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    #controls button {
      background: #111;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    #controls button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #statusText {
      position: fixed;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      color: #999;
      font-size: 14px;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }
    #gameOverText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      display: none;
      user-select: none;
      z-index: 12;
    }
    #gameOverText h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }
    #gameOverText p {
      margin: 0;
      font-size: 18px;
      opacity: 0.9;
    }
    #startScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,16,0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      letter-spacing: 2px;
      user-select: none;
      text-align: center;
    }
    #startScreen h1 {
      font-size: 48px;
      margin-bottom: 14px;
      letter-spacing: 4px;
    }
    #startScreen button {
      background: #008cff;
      color: #fff;
      border: none;
      font-size: 20px;
      padding: 12px 36px;
      margin-top: 32px;
      border-radius: 5px;
      cursor: pointer;
      outline: none;
      transition: background 0.2s;
    }
    #startScreen button:hover {
      background: #3ae2ff;
    }
    #credit {
      color: #aaa;
      font-size: 13px;
      margin-top: 32px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1>飞机大战</h1>
    <div style="font-size:18px;">
      鼠标或手指控制飞机位置<br>
      自动射击和自动刷怪<br>
      避免碰到敌人，分数+10/击落一只<br>
      <br>
      <b>纯前端无素材小游戏</b>
    </div>
    <button id="realStartBtn">开始游戏</button>
    <div id="credit">by GPT Rewriter</div>
  </div>
  <div id="hud">分数：<span id="score">0</span></div>
  <div id="controls">
    <button id="startBtn" disabled>开始游戏</button>
    <button id="pauseBtn" disabled>暂停</button>
  </div>
  <div id="statusText">点击“开始游戏”后开始刷怪与自动射击</div>
  <canvas id="gameCanvas"></canvas>
  <div id="gameOverText">
    <h1>游戏结束</h1>
    <p>按 R 键重新开始</p>
  </div>
  <!-- 音效资源 -->
  <audio id="shootAudio" src="https://cdn.jsdelivr.net/gh/sentsin/static@main/shoot.wav"></audio>
  <audio id="explosionAudio" src="https://cdn.jsdelivr.net/gh/sentsin/static@main/explosion.wav"></audio>
  <audio id="bgmAudio" src="https://cdn.jsdelivr.net/gh/sentsin/static@main/bg1.ogg" loop></audio>
  <script>
    // ------------ 基础DOM绑定 ------------
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const gameOverText = document.getElementById("gameOverText");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const statusText = document.getElementById("statusText");
    const startScreen = document.getElementById("startScreen");
    const realStartBtn = document.getElementById("realStartBtn");
    // 音效
    const shootAudio = document.getElementById("shootAudio");
    const explosionAudio = document.getElementById("explosionAudio");
    const bgmAudio = document.getElementById("bgmAudio");

    function resizeCanvas() {
      canvas.width = Math.min(window.innerWidth, 480);
      canvas.height = Math.min(window.innerHeight, 720);
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // ------------ 游戏数据结构 ------------
    const player = {
      width: 36,
      height: 24,
      x: 0,
      y: 0,
      speedFollow: 0.25
    };
    const mouse = {
      x: canvas.width / 2,
      y: canvas.height - 80
    };
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let score = 0;
    let gameOver = false;
    let started = false;
    let paused = false;
    let lastShootTime = 0;
    let lastEnemySpawnTime = 0;

    const SHOOT_INTERVAL = 90; // 子弹更快，发射间隔减少
    const ENEMY_SPAWN_INTERVAL = 320; // 敌机更密集，刷怪间隔减少

    function resetPlayerPosition() {
      player.x = canvas.width / 2 - player.width / 2;
      player.y = canvas.height - player.height - 24;
      mouse.x = player.x + player.width / 2;
      mouse.y = player.y + player.height / 2;
    }
    resetPlayerPosition();

    // ------------ 交互事件 ------------
    canvas.addEventListener("mousemove", (e) => {
      if (!started || paused) return;
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });
    canvas.addEventListener("touchmove", (e) => {
      if (!started || paused) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      mouse.x = touch.clientX - rect.left;
      mouse.y = touch.clientY - rect.top;
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      if ((e.key === "r" || e.key === "R") && gameOver) {
        restartGame();
      }
    });

    realStartBtn.addEventListener("click", () => {
      // 关闭开始界面，允许点击正式按钮
      startScreen.style.display = "none";
      startBtn.disabled = false;
      statusText.textContent = "点击“开始游戏”后开始刷怪与自动射击";
      // 尝试启动BGM（auto-play有时需要用户交互，这里可启动）
      try { bgmAudio.currentTime = 0; bgmAudio.volume = 0.6; bgmAudio.play(); } catch (e) {}
    });
    startBtn.addEventListener("click", () => {
      if (started) return;
      started = true;
      paused = false;
      gameOver = false;
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = "暂停";
      statusText.textContent = "游戏进行中";
      lastShootTime = performance.now();
      lastEnemySpawnTime = performance.now();
      // music
      try{ if (bgmAudio.paused) { bgmAudio.currentTime = 0; bgmAudio.play(); }}catch(e){}
      requestAnimationFrame(gameLoop);
    });
    pauseBtn.addEventListener("click", () => {
      if (!started || gameOver) return;
      paused = !paused;
      if (paused) {
        pauseBtn.textContent = "继续";
        statusText.textContent = "已暂停";
        try{ bgmAudio.pause();}catch(e){}
      } else {
        pauseBtn.textContent = "暂停";
        statusText.textContent = "游戏进行中";
        lastShootTime = performance.now();
        lastEnemySpawnTime = performance.now();
        // 继续bgm
        try{ bgmAudio.play(); }catch(e){}
        requestAnimationFrame(gameLoop);
      }
    });

    // ------------ 逻辑与渲染 ------------

    function shoot() {
      bullets.push({
        x: player.x + player.width / 2 - 2,
        y: player.y - 14,
        width: 4,
        height: 14,
        speed: 15 // 让子弹更快
      });
      try{shootAudio.currentTime=0;shootAudio.play();}catch(e){}
    }

    function spawnEnemy() {
      // 敌机是圆形
      const radius = 16 + Math.random()*6;
      const x = radius + Math.random() * (canvas.width - radius*2);
      const y = -radius-2;
      // 敌机速度快慢略有变化
      const speed = 2.5 + Math.random() * 2.2;
      enemies.push({ x, y, radius, speed });
    }

    // 三角形玩家机：实现碰撞检测多用AABB包络盒，视觉上是三角形
    function isColliding(a, b) {
      // a: 子弹或玩家, 是{ x,y,width,height }
      // b: 敌机, 是{ x, y, radius }
      // 检测矩形与圆形碰撞
      if (b.radius) {
        // AABB最近点
        let nearestX = Math.max(a.x, Math.min(b.x, a.x + a.width));
        let nearestY = Math.max(a.y, Math.min(b.y, a.y + a.height));
        let dx = b.x - nearestX;
        let dy = b.y - nearestY;
        return (dx * dx + dy * dy) <= (b.radius * b.radius);
      }
      // 原敌机(矩形)方案的兼容性，已不用
      return false;
    }

    // 玩家三角形碰撞
    function isPlayerHit(enemy) {
      // 判断三角形外接矩形和圆形碰撞
      let a = {
        x: player.x,
        y: player.y,
        width: player.width,
        height: player.height
      };
      return isColliding(a, enemy);
    }

    function updatePlayer() {
      const targetX = mouse.x - player.width / 2;
      const targetY = mouse.y - player.height / 2;
      player.x += (targetX - player.x) * player.speedFollow;
      player.y += (targetY - player.y) * player.speedFollow;
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y + bullets[i].height < 0) {
          bullets.splice(i, 1);
        }
      }
    }

    function updateEnemies() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += enemies[i].speed;
        if (enemies[i].y - enemies[i].radius > canvas.height+30) {
          enemies.splice(i, 1);
        }
      }
    }

    function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
        let ex = explosions[i];
        ex.frame++;
        if (ex.frame > ex.maxFrame) {
          explosions.splice(i, 1);
        }
      }
    }

    function handleCollisions() {
      // 子弹和敌机
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = enemies.length - 1; j >= 0; j--) {
          if (isColliding(bullets[i], enemies[j])) {
            // 爆炸
            createExplosion(enemies[j].x, enemies[j].y);
            try{ explosionAudio.currentTime=0; explosionAudio.play();}catch(e){}
            bullets.splice(i, 1);
            enemies.splice(j, 1);
            score += 10;
            scoreEl.textContent = score;
            break;
          }
        }
      }
      // 敌机和玩家飞机
      for (let i = 0; i < enemies.length; i++) {
        if (isPlayerHit(enemies[i])) {
          // 玩家爆炸
          createExplosion(player.x + player.width/2, player.y + player.height/2, true);
          try{ explosionAudio.currentTime=0; explosionAudio.play();}catch(e){}
          gameOver = true;
          gameOverText.style.display = "block";
          try{bgmAudio.pause();}catch(e){}
          break;
        }
      }
    }

    function createExplosion(x, y, isBig) {
      explosions.push({
        x, y,
        radius: isBig ? 38 : 22,
        color: isBig ? ["#fff", "#fd0", "#fa0", "#f33"] : ["#fff","#ff0","#f60","#f00"],
        frame: 0,
        maxFrame: isBig ? 26 : 18
      });
    }

    function drawPlayer() {
      // 画白色三角形
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y); // 上顶点
      ctx.lineTo(player.x, player.y + player.height);   // 左下
      ctx.lineTo(player.x + player.width, player.y + player.height); // 右下
      ctx.closePath();
      ctx.shadowColor = "#53eaff";
      ctx.shadowBlur = 16;
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.shadowBlur = 0;
      // 前机舱风挡
      ctx.beginPath();
      ctx.moveTo(player.x + player.width/2, player.y + 5);
      ctx.lineTo(player.x + player.width/2 - 6, player.y + 18);
      ctx.lineTo(player.x + player.width/2 + 6, player.y + 18);
      ctx.closePath();
      ctx.fillStyle = "#49bcfa";
      ctx.fill();
      ctx.restore();
    }

    function drawBullets() {
      ctx.save();
      ctx.shadowColor = "#18e0ff";
      ctx.shadowBlur = 8;
      ctx.fillStyle = "#34cfff";
      bullets.forEach((b) => {
        ctx.fillRect(b.x, b.y, b.width, b.height);
      });
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawEnemies() {
      enemies.forEach((e) => {
        // 画圆形
        ctx.save();
        let grad = ctx.createRadialGradient(
          e.x, e.y, 3,
          e.x, e.y, e.radius
        );
        grad.addColorStop(0, "#fff");
        grad.addColorStop(0.3, "#fa8b78");
        grad.addColorStop(1, "#ed1818");
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2, false);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.shadowColor = "#fd8b43";
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
        // 画圆环花纹（可选）
        ctx.save();
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius*0.6, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      });
    }

    function drawExplosions() {
      for (let ex of explosions) {
        let pct = ex.frame / ex.maxFrame;
        let rad = ex.radius * (0.8 + Math.random()*0.35 + pct*0.89);
        ctx.save();
        for(let i=0;i<ex.color.length;i++){
            let progress = i / (ex.color.length-1);
            ctx.beginPath();
            ctx.arc(ex.x, ex.y, rad*(1-progress*0.94)*(1-pct*0.7), 0, Math.PI*2);
            ctx.globalAlpha = 1-(pct*1.01)+(1-progress)*0.08;
            ctx.fillStyle = ex.color[i];
            ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPlayer();
      drawBullets();
      drawEnemies();
      drawExplosions();
    }

    function restartGame() {
      bullets = [];
      enemies = [];
      explosions = [];
      score = 0;
      gameOver = false;
      started = true;
      paused = false;
      scoreEl.textContent = score;
      gameOverText.style.display = "none";
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = "暂停";
      statusText.textContent = "游戏进行中";
      lastShootTime = performance.now();
      lastEnemySpawnTime = performance.now();
      resetPlayerPosition();
      try{bgmAudio.currentTime=0;bgmAudio.play();}catch(e){}
      render();
      requestAnimationFrame(gameLoop);
    }

    function gameLoop(timestamp) {
      if (gameOver || paused || !started) return;

      if (timestamp - lastShootTime >= SHOOT_INTERVAL) {
        shoot();
        lastShootTime = timestamp;
      }
      if (timestamp - lastEnemySpawnTime >= ENEMY_SPAWN_INTERVAL) {
        spawnEnemy();
        lastEnemySpawnTime = timestamp;
      }
      updatePlayer();
      updateBullets();
      updateEnemies();
      updateExplosions();
      handleCollisions();
      render();
      requestAnimationFrame(gameLoop);
    }

    // 初始渲染
    render();
  </script>
</body>
</html>
